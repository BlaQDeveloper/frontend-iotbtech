<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/39a991f435.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Instagram Header</title>
</head>

<body>
    <div class="instagram-header">
        <button class="hamburger">
            <i class="fas fa-bars"></i>
        </button>
        <div class="instagram-header-content">
            <div class="home">
                <div><img src="icons/Icon.svg" alt="home-icon"></div>
                <div>Home</div>
            </div>
            <div class="reels">
                <div><img src="icons/reel.png" alt="reels-icon" width="24px" height="24px"></div>
                <div>Reels</div>
            </div>
            <div class="messages">
                <div><img src="icons/send.png" alt="messenger-icon" width="24px" height="24px"></div>
                <div>Messages</div>
            </div>
            <div class="search">
                <div><img src="icons/search-icon.svg" alt="search-icon"></div>
                <div>Search</div>
            </div>
            <div class="notifications">
                <div><img src="icons/like-icon.svg" alt="notifications-icon"></div>
                <div>Notifications</div>
            </div>
            <div class="create">
                <div><img src="icons/create-icon.svg" alt="create-icon"></div>
                <div>Create</div>
            </div>
            <div class="profile">
                <div><img src="icons/profile-pic.png" alt="profile-icon"></div>
                <div>Profile</div>
            </div>
        </div>
    </div>
</body>

</html>
